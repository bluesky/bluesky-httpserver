services:
  openldap:
    image: osixia/openldap:1.5.0
    ports:
      - '1389:389'
      - '1636:636'
    environment:
      - LDAP_ORGANISATION=Example Inc.
      - LDAP_DOMAIN=example.org
      - LDAP_ADMIN_PASSWORD=adminpassword
    volumes:
      - 'openldap_data:/var/lib/ldap'

volumes:
  openldap_data:
    driver: local
